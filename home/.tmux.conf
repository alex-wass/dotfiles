# windows
set-option -g allow-rename off
#setw -g mouse on
set -g base-index 1
set-window-option -gq -g pane-base-index 1
set -g history-limit 50000
set -g status-right " #(tms sessions)"
setw -g aggressive-resize on

# bindings
unbind C-a
set -g prefix C-a
bind C-a send-prefix

unbind %
bind \\ split-window -h

unbind '"'
bind - split-window -v

bind C-o display-popup -E "tms"
bind C-j display-popup -E "tms switch"
bind C-r "run-shell 'tms refresh'"
bind C-k "run-shell 'tms kill'"
bind C-a switch-client -l
bind -r C-, switch-client -p\; refresh-client -S
bind -r C-. switch-client -n\; refresh-client -S

# statusbar
#set -g status-position bottom
#set -g status-justify left
set -g status-style 'fg=white'
